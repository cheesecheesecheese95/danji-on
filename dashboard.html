<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DMC파크뷰자이 ON — 관리자 대시보드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F5F7;color:#1A1A2E;min-height:100vh}
  :root{
    --navy:#1A3C6E;--green:#1A6E3C;--amber:#B8860B;--red:#C0392B;
    --gray-100:#F4F5F7;--gray-200:#E8EAF0;--gray-400:#9FA3B0;--gray-600:#5A5F72;--gray-800:#1A1A2E;
  }
  header{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;font-weight:700}
  header span{font-size:12px;opacity:0.7;margin-left:auto}
  .container{max-width:720px;margin:0 auto;padding:20px 16px}
  .section{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .section-title{font-size:13px;font-weight:700;color:var(--gray-400);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:16px}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat{background:var(--gray-100);border-radius:12px;padding:14px 12px;text-align:center}
  .stat-num{font-size:26px;font-weight:800;color:var(--navy);line-height:1}
  .stat-label{font-size:11px;color:var(--gray-400);margin-top:4px}

  /* 설문 */
  .bar-row{margin-bottom:14px}
  .bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .bar-label{font-weight:600;color:var(--gray-800)}
  .bar-info{color:var(--gray-400)}
  .bar-track{background:var(--gray-200);border-radius:99px;height:10px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease}
  .c-very{background:#1A3C6E}
  .c-needed{background:#2E7D52}
  .c-unsure{background:#B8860B}
  .c-not{background:#C0392B}

  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px}
  .badge-live{background:#E8F5EE;color:var(--green)}

  .refresh-btn{display:block;margin:8px auto 0;background:none;border:1px solid var(--gray-200);border-radius:10px;padding:7px 20px;font-size:12px;color:var(--gray-600);cursor:pointer;font-family:inherit}
  .refresh-btn:hover{background:var(--gray-100)}

  /* 비밀번호 화면 */
  #gate{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
  #gate h2{font-size:17px;font-weight:700;color:var(--navy)}
  #gate p{font-size:12px;color:var(--gray-400)}
  #gate input{border:1.5px solid var(--gray-200);border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;width:220px;text-align:center}
  #gate input:focus{border-color:var(--navy)}
  #gate button{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  #gate .err{font-size:12px;color:var(--red);min-height:16px}

  .home-link{font-size:12px;color:var(--gray-400);text-decoration:none;display:block;text-align:center;margin-top:8px}
  .home-link:hover{color:var(--navy)}
  .menu-link{display:block;background:var(--gray-100);border-radius:12px;padding:11px 12px;font-size:13px;font-weight:600;color:var(--gray-800);text-decoration:none;transition:background 0.1s;}
  .menu-link:hover{background:var(--gray-200);}
  .updated{font-size:11px;color:var(--gray-400);text-align:right;margin-top:12px}
</style>
</head>
<body>

<!-- 비밀번호 게이트 -->
<div id="gate">
  <div style="font-size:32px">🏠</div>
  <h2>DMC파크뷰자이 ON</h2>
  <p>관리자 전용 대시보드</p>
  <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()">
  <button onclick="checkPw()">입장</button>
  <div class="err" id="pw-err"></div>
</div>

<!-- 대시보드 본문 -->
<div id="dashboard" style="display:none">
  <header>
    <div>🏠</div>
    <h1>DMC파크뷰자이 ON — 대시보드</h1>
    <span id="last-updated"></span>
  </header>

  <div class="container">

    <!-- 설문 결과 -->
    <div class="section">
      <div class="section-title">📊 주민 설문 <span class="badge badge-live">LIVE</span></div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">총 응답</div></div>
        <div class="stat"><div class="stat-num" id="s-pos">—</div><div class="stat-label">긍정 응답</div></div>
        <div class="stat"><div class="stat-num" id="s-pos-pct">—</div><div class="stat-label">긍정 비율</div></div>
      </div>

      <div class="bar-row">
        <div class="bar-top"><span class="bar-label">매우 필요하다</span><span class="bar-info" id="b-very">0표</span></div>
        <div class="bar-track"><div class="bar-fill c-very" id="bf-very" style="width:0%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-top"><span class="bar-label">필요하다</span><span class="bar-info" id="b-needed">0표</span></div>
        <div class="bar-track"><div class="bar-fill c-needed" id="bf-needed" style="width:0%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-top"><span class="bar-label">아직 모르겠다</span><span class="bar-info" id="b-unsure">0표</span></div>
        <div class="bar-track"><div class="bar-fill c-unsure" id="bf-unsure" style="width:0%"></div></div>
      </div>
      <div class="bar-row" style="margin-bottom:0">
        <div class="bar-top"><span class="bar-label">필요하지 않다</span><span class="bar-info" id="b-not">0표</span></div>
        <div class="bar-track"><div class="bar-fill c-not" id="bf-not" style="width:0%"></div></div>
      </div>

      <button class="refresh-btn" onclick="loadAll()">↻ 새로고침</button>
      <div class="updated" id="survey-updated"></div>
    </div>

    <!-- 방문·메뉴 통계 -->
    <div class="section">
      <div class="section-title">👆 방문 · 메뉴별 클릭 <span class="badge badge-live">LIVE</span></div>
      <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px;">
        <div class="stat"><div class="stat-num" id="t-visit">—</div><div class="stat-label">총 방문</div></div>
        <div class="stat"><div class="stat-num" id="t-today">—</div><div class="stat-label">오늘 방문</div></div>
        <div class="stat"><div class="stat-num" id="t-menus">—</div><div class="stat-label">총 메뉴클릭</div></div>
      </div>
      <div id="menu-stat-list">불러오는 중…</div>
      <button class="refresh-btn" onclick="loadTrack()">↻ 새로고침</button>
    </div>

    <!-- Vercel Analytics 바로가기 -->
    <div class="section" style="text-align:center;padding:16px;">
      <div style="font-size:12px;color:var(--gray-400);margin-bottom:8px;">상세 방문자 분석 (디바이스·지역·경로)</div>
      <a href="https://vercel.com/cheesecheesecheese95/danji-on/analytics" target="_blank"
         style="display:inline-block;background:var(--navy);color:#fff;border-radius:12px;padding:10px 24px;font-size:13px;font-weight:700;text-decoration:none;">
        Vercel Analytics 보기 →
      </a>
    </div>

    <!-- 입주민 인증 목록 -->
    <div class="section">
      <div class="section-title">🏠 입주민 인증 목록</div>
      <div id="resident-stats" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;">
        <div class="stat"><div class="stat-num" id="r-total">—</div><div class="stat-label">총 인증</div></div>
        <div class="stat"><div class="stat-num" id="r-danji">—</div><div class="stat-label">단지 수</div></div>
      </div>
      <div id="resident-list" style="font-size:13px;color:var(--gray-600);">불러오는 중…</div>
      <button class="refresh-btn" onclick="loadResidents()">↻ 새로고침</button>
    </div>

    <a class="home-link" href="/">← 홈으로</a>
  </div>
</div>

<script>
const PW_KEY = 'dash-auth';
const CORRECT = 'parkview2024';

// 메뉴 정의: [트래킹키, 아이콘, 레이블, 링크URL]
const MENUS = [
  ['tab:fee',       '💰', '관리비',     '/#fee'],
  ['tab:community', '🏊', '커뮤니티',   '/#community'],
  ['page:parking',  '🚗', '주차·차량',  '/#parking'],
  ['page:repair',   '🛠️', '수리·하자',  '/#repair'],
  ['page:living',   '🧺', '생활편의',   '/#living'],
  ['page:complaint','📋', '민원·규정',  '/#complaint'],
  ['page:news',     '📢', '단지소식',   '/#news'],
  ['page:emergency','🏥', '응급의료',   '/#emergency'],
  ['page:library',  '📚', '도서관',     '/#library'],
  ['page:realestate','🏠','실거래가',   '/#realestate'],
  ['page:faq',      '❓', '자주찾는질문','/#faq'],
  ['page:register', '🔑', '입주민인증', '/#register'],
  ['culture',       '🎪', '문화·행사',  '/culture.html'],
];

function checkPw(){
  const v = document.getElementById('pw-input').value;
  if(v === CORRECT){
    sessionStorage.setItem(PW_KEY,'1');
    document.getElementById('gate').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadAll();
  } else {
    document.getElementById('pw-err').textContent='비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value='';
  }
}

if(sessionStorage.getItem(PW_KEY)==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

function loadAll(){ loadSurvey(); loadTrack(); loadResidents(); }

async function loadResidents(){
  try {
    const r = await fetch('/api/register?secret=' + CORRECT);
    const d = await r.json();
    const list = d.list || [];

    document.getElementById('r-total').textContent = list.length;
    const danjiSet = new Set(list.map(l => l.danji));
    document.getElementById('r-danji').textContent = danjiSet.size;

    if(list.length === 0){
      document.getElementById('resident-list').innerHTML = '<span style="color:var(--gray-400)">아직 인증한 주민이 없어요</span>';
      return;
    }

    // 최신순 정렬
    const sorted = [...list].sort((a,b) => (b.ts||'').localeCompare(a.ts||''));
    const html = sorted.map(l => {
      const date = l.ts ? new Date(l.ts).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : l.date || '';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-200);">
        <div>
          <span style="font-weight:700;color:var(--gray-800);">${l.danji} ${l.dong}동 ${l.ho}호</span>
          <span style="color:var(--gray-600);margin-left:8px;">${l.name}</span>
        </div>
        <span style="font-size:11px;color:var(--gray-400);white-space:nowrap;">${date}</span>
      </div>`;
    }).join('');
    document.getElementById('resident-list').innerHTML = html;
  } catch(e) {
    document.getElementById('resident-list').innerHTML = '<span style="color:var(--red)">불러오기 실패</span>';
  }
}

async function loadSurvey(){
  try {
    const r = await fetch('/api/survey');
    const d = await r.json();
    const { counts, total } = d;
    const pos = (counts.very_needed||0) + (counts.needed||0);

    document.getElementById('s-total').textContent = total;
    document.getElementById('s-pos').textContent = pos;
    document.getElementById('s-pos-pct').textContent = total > 0 ? Math.round(pos/total*100)+'%' : '—';

    setBar('very', counts.very_needed||0, total);
    setBar('needed', counts.needed||0, total);
    setBar('unsure', counts.unsure||0, total);
    setBar('not', counts.not_needed||0, total);

    const now = new Date().toLocaleTimeString('ko-KR');
    document.getElementById('survey-updated').textContent = `마지막 업데이트: ${now}`;
    document.getElementById('last-updated').textContent = now;
  } catch(e) { console.error(e); }
}

function setBar(id, count, total){
  const pct = total > 0 ? Math.round(count/total*100) : 0;
  document.getElementById(`b-${id}`).textContent = `${count}표 (${pct}%)`;
  document.getElementById(`bf-${id}`).style.width = pct + '%';
}

async function loadTrack(){
  try {
    const r = await fetch('/api/track-stats');
    const d = await r.json();

    const totalVisit = d.total['visit'] || 0;
    const todayVisit = d.today['visit'] || 0;
    document.getElementById('t-visit').textContent = totalVisit.toLocaleString();
    document.getElementById('t-today').textContent = todayVisit.toLocaleString();

    // 메뉴 클릭 합계
    const totalMenuClicks = MENUS.reduce((s,[k]) => s + (d.total[k]||0), 0);
    document.getElementById('t-menus').textContent = totalMenuClicks.toLocaleString();

    // 메뉴별 통계 (클릭 많은 순 정렬)
    const menuData = MENUS.map(([key, icon, label, url]) => ({
      key, icon, label, url,
      total: d.total[key] || 0,
      today: d.today[key] || 0,
    })).sort((a, b) => b.total - a.total);

    const max = menuData[0]?.total || 1;

    const html = menuData.map(m => {
      const pct = Math.round(m.total / max * 100);
      const todayBadge = m.today > 0
        ? `<span style="font-size:10px;font-weight:700;color:var(--green);background:#E8F5EE;padding:1px 6px;border-radius:8px;margin-left:6px;">+${m.today}오늘</span>`
        : '';
      return `
        <a href="${m.url}" target="_blank" style="display:block;text-decoration:none;margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <span style="font-size:13px;font-weight:600;color:var(--gray-800);">${m.icon} ${m.label}${todayBadge}</span>
            <span style="font-size:12px;color:var(--gray-400);">${m.total.toLocaleString()}회</span>
          </div>
          <div style="background:var(--gray-200);border-radius:99px;height:6px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:var(--navy);border-radius:99px;transition:width 0.6s ease;"></div>
          </div>
        </a>`;
    }).join('');

    document.getElementById('menu-stat-list').innerHTML = html || '<span style="color:var(--gray-400)">데이터 없음</span>';
  } catch(e) { console.error(e); }
}

if(sessionStorage.getItem(PW_KEY)==='1') loadAll();
</script>
</body>
</html>
