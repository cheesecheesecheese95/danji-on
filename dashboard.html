<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DMC파크뷰자이 ON — 관리자 대시보드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F4F5F7;color:#1A1A2E;min-height:100vh}
  :root{
    --navy:#1A3C6E;--green:#1A6E3C;--amber:#B8860B;--red:#C0392B;
    --gray-100:#F4F5F7;--gray-200:#E8EAF0;--gray-400:#9FA3B0;--gray-600:#5A5F72;--gray-800:#1A1A2E;
  }
  header{background:var(--navy);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;font-weight:700}
  header span{font-size:12px;opacity:0.7;margin-left:auto}
  .container{max-width:720px;margin:0 auto;padding:20px 16px}
  .section{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .section-title{font-size:13px;font-weight:700;color:var(--gray-400);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:16px}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat{background:var(--gray-100);border-radius:12px;padding:14px 12px;text-align:center}
  .stat-num{font-size:26px;font-weight:800;color:var(--navy);line-height:1}
  .stat-label{font-size:11px;color:var(--gray-400);margin-top:4px}

  /* 설문 */
  .bar-row{margin-bottom:14px}
  .bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .bar-label{font-weight:600;color:var(--gray-800)}
  .bar-info{color:var(--gray-400)}
  .bar-track{background:var(--gray-200);border-radius:99px;height:10px;overflow:hidden}
  .bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease}
  .c-very{background:#1A3C6E}
  .c-needed{background:#2E7D52}
  .c-unsure{background:#B8860B}
  .c-not{background:#C0392B}

  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-left:6px}
  .badge-live{background:#E8F5EE;color:var(--green)}

  .refresh-btn{display:block;margin:8px auto 0;background:none;border:1px solid var(--gray-200);border-radius:10px;padding:7px 20px;font-size:12px;color:var(--gray-600);cursor:pointer;font-family:inherit}
  .refresh-btn:hover{background:var(--gray-100)}

  /* 비밀번호 화면 */
  #gate{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
  #gate h2{font-size:17px;font-weight:700;color:var(--navy)}
  #gate p{font-size:12px;color:var(--gray-400)}
  #gate input{border:1.5px solid var(--gray-200);border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;width:220px;text-align:center}
  #gate input:focus{border-color:var(--navy)}
  #gate button{background:var(--navy);color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  #gate .err{font-size:12px;color:var(--red);min-height:16px}

  .home-link{font-size:12px;color:var(--gray-400);text-decoration:none;display:block;text-align:center;margin-top:8px}
  .home-link:hover{color:var(--navy)}
  .updated{font-size:11px;color:var(--gray-400);text-align:right;margin-top:12px}
</style>
</head>
<body>

<!-- 비밀번호 게이트 -->
<div id="gate">
  <div style="font-size:32px">🏠</div>
  <h2>DMC파크뷰자이 ON</h2>
  <p>관리자 전용 대시보드</p>
  <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')checkPw()">
  <button onclick="checkPw()">입장</button>
  <div class="err" id="pw-err"></div>
</div>

<!-- 대시보드 본문 -->
<div id="dashboard" style="display:none">
  <header>
    <div>🏠</div>
    <h1>DMC파크뷰자이 ON — 대시보드</h1>
    <span id="last-updated"></span>
  </header>

  <div class="container">

    <!-- 설문 결과 -->
    <div class="section">
      <div class="section-title">📊 주민 설문 <span class="badge badge-live">LIVE</span></div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">총 응답</div></div>
        <div class="stat"><div class="stat-num" id="s-pos">—</div><div class="stat-label">긍정 응답</div></div>
        <div class="stat"><div class="stat-num" id="s-pos-pct">—</div><div class="stat-label">긍정 비율</div></div>
      </div>

      <div class="bar-row">
        <div class="bar-top"><span class="bar-label">매우 필요하다</span><span class="bar-info" id="b-very">0표</span></div>
        <div class="bar-track"><div class="bar-fill c-very" id="bf-very" style="width:0%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-top"><span class="bar-label">필요하다</span><span class="bar-info" id="b-needed">0표</span></div>
        <div class="bar-track"><div class="bar-fill c-needed" id="bf-needed" style="width:0%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-top"><span class="bar-label">아직 모르겠다</span><span class="bar-info" id="b-unsure">0표</span></div>
        <div class="bar-track"><div class="bar-fill c-unsure" id="bf-unsure" style="width:0%"></div></div>
      </div>
      <div class="bar-row" style="margin-bottom:0">
        <div class="bar-top"><span class="bar-label">필요하지 않다</span><span class="bar-info" id="b-not">0표</span></div>
        <div class="bar-track"><div class="bar-fill c-not" id="bf-not" style="width:0%"></div></div>
      </div>

      <button class="refresh-btn" onclick="loadSurvey()">↻ 새로고침</button>
      <div class="updated" id="survey-updated"></div>
    </div>

    <a class="home-link" href="/">← 홈으로</a>
  </div>
</div>

<script>
const PW_KEY = 'dash-auth';
const CORRECT = 'parkview2024';

function checkPw(){
  const v = document.getElementById('pw-input').value;
  if(v === CORRECT){
    sessionStorage.setItem(PW_KEY,'1');
    document.getElementById('gate').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadSurvey();
  } else {
    document.getElementById('pw-err').textContent='비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value='';
  }
}

// 이미 인증된 경우
if(sessionStorage.getItem(PW_KEY)==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

async function loadSurvey(){
  try {
    const r = await fetch('/api/survey');
    const d = await r.json();
    const { counts, total } = d;
    const pos = (counts.very_needed||0) + (counts.needed||0);

    document.getElementById('s-total').textContent = total;
    document.getElementById('s-pos').textContent = pos;
    document.getElementById('s-pos-pct').textContent = total > 0 ? Math.round(pos/total*100)+'%' : '—';

    setBar('very', counts.very_needed||0, total);
    setBar('needed', counts.needed||0, total);
    setBar('unsure', counts.unsure||0, total);
    setBar('not', counts.not_needed||0, total);

    const now = new Date().toLocaleTimeString('ko-KR');
    document.getElementById('survey-updated').textContent = `마지막 업데이트: ${now}`;
    document.getElementById('last-updated').textContent = now;
  } catch(e) {
    console.error(e);
  }
}

function setBar(id, count, total){
  const pct = total > 0 ? Math.round(count/total*100) : 0;
  document.getElementById(`b-${id}`).textContent = `${count}표 (${pct}%)`;
  document.getElementById(`bf-${id}`).style.width = pct + '%';
}

if(sessionStorage.getItem(PW_KEY)==='1') loadSurvey();
</script>
</body>
</html>
