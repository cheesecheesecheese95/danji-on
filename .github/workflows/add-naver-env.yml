name: Vercel 네이버 API 키 등록 (1회용)

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/add-naver-env.yml'

jobs:
  add-env:
    runs-on: ubuntu-latest
    steps:
      - name: 네이버 API 키 등록
        run: |
          PROJECT_ID="prj_DKLFRqlXOucC21WL987h72tIhN6B"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          add_env() {
            KEY_NAME=$1
            KEY_VALUE=$2

            EXISTING=$(curl -s "https://api.vercel.com/v9/projects/${PROJECT_ID}/env" \
              -H "Authorization: Bearer ${TOKEN}" | \
              python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          envs = [e for e in d.get('envs', []) if e['key'] == '${KEY_NAME}']
          print(envs[0]['id'] if envs else '')
          ")

            if [ -n "$EXISTING" ]; then
              curl -s -X DELETE "https://api.vercel.com/v9/projects/${PROJECT_ID}/env/${EXISTING}" \
                -H "Authorization: Bearer ${TOKEN}"
            fi

            curl -s -X POST "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"key\": \"${KEY_NAME}\",
                \"value\": \"${KEY_VALUE}\",
                \"type\": \"encrypted\",
                \"target\": [\"production\", \"preview\", \"development\"]
              }"
            echo "${KEY_NAME} 등록 완료"
          }

          add_env "NAVER_CLIENT_ID"     "5KR34POPcgQ_fodQNcjX"
          add_env "NAVER_CLIENT_SECRET" "xTyItev1jr"
